<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨뜰 - 실 바꾼 혼잡도 피하기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>🌿 숨뜰 데이트 가이드</h2>
        <p>현재 계신 곳이나 갈 곳을 선택하세요.</p>
        
        <select id="areaSelect">
            <option value="홍대">홍대</option>
            <option value="명동">명동</option>
            <option value="강남">강남</option>
            <option value="성수">성수동 카페거리</option>
        </select>
        
        <button onclick="checkCongestion()">실시간 혼잡도 분석 및 추천</button>

        <div id="result-box">
            <h3><span id="res-icon"></span> <span id="res-area"></span> 상태: <span id="res-level" class="highlight"></span></h3>
            <p id="res-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
